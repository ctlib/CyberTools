name: Deploy CyberTools to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install build dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tailwind CSS
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit

      - name: Audit static app
        run: pnpm run audit

      - name: Prepare Pages artifact
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site

          cp -R .well-known assets css js tools _site/
          cp .nojekyll 404.html about.html humans.txt index.html manifest.webmanifest privacy.html robots.txt service-worker.js sitemap.xml _site/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
