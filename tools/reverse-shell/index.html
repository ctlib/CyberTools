    <div class="tool-header">
        <h1 class="tool-title">Reverse Shell Generator</h1>
        <p class="tool-description">Generate reverse shell one-liners for 10+ languages and tools.</p>
    </div>

    <div style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--danger);">
        <strong>Authorized use only.</strong> Only use against systems you own or have explicit written permission to test. Unauthorized access is illegal.
    </div>

    <div class="tool-panel" style="margin-bottom:24px;">
        <div style="display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;">
            <div style="flex:1;min-width:180px;">
                <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">LISTENER IP</label>
                <input id="ip" type="text" value="10.10.10.10" oninput="renderAll()" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:'JetBrains Mono',monospace;box-sizing:border-box;" />
            </div>
            <div style="flex:0 0 140px;">
                <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">PORT</label>
                <input id="port" type="number" value="4444" min="1" max="65535" oninput="renderAll()" style="width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);font-family:'JetBrains Mono',monospace;box-sizing:border-box;" />
            </div>
            <div style="flex:0 0 auto;">
                <label style="display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;">SHELL</label>
                <select id="shell-bin" onchange="renderAll()" style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);cursor:pointer;">
                    <option value="/bin/sh">/bin/sh</option>
                    <option value="/bin/bash">/bin/bash</option>
                    <option value="cmd.exe">cmd.exe</option>
                </select>
            </div>
