<main id="ct-main">
    <div class="tool-header">
        <h1 class="tool-title">Common Ports Reference</h1>
        <p class="tool-description">Searchable reference of 70+ common TCP/UDP ports with security risk indicators.</p>
    </div>

    <div class="tool-panel">
        <input id="portSearch" class="input" type="text" placeholder="Search port, protocol, or keyword…" style="width:100%;" />
        <span id="portCount" style="font-size:12px;color:var(--text-muted);display:block;margin-top:6px;"></span>
    </div>

    <div class="tool-panel" style="margin-top:16px;overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
            <thead>
                <tr style="font-size:12px;color:var(--text-muted);text-align:left;border-bottom:1px solid var(--border);">

                    <th style="padding:8px 10px;">Protocol</th>
                    <th style="padding:8px 10px;">Name</th>
                    <th style="padding:8px 10px;">Description</th>
                    <th style="padding:8px 10px;">Risk</th>
                </tr>
            </thead>
            <tbody id="portsTable"></tbody>
        </table>
    </div>

    <div class="tool-panel" style="margin-top:16px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
        <div style="font-size:12px;font-weight:700;color:var(--text-muted);">Legend:</div>
        <span style="background:var(--danger);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;">RISKY</span>
        <span style="font-size:12px;color:var(--text-muted);">exposed → immediate attack surface</span>
        <span style="background:var(--warning);color:#000;font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;">COMMON TARGET</span>
        <span style="font-size:12px;color:var(--text-muted);">frequently targeted by attackers</span>
    </div>
