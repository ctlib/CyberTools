    <body data-ct-active-tool="google-dorks" data-ct-tool-source="tools/google-dorks/script.js">
        <div style="max-width: 960px; margin: 0 auto; padding: 32px 24px">
            <div class="tool-header">
                <h1 class="tool-title">Google Dorks Builder</h1>
                <p class="tool-description">Build Google search operators and browse a preset dork library.</p>
            </div>

            <!-- Builder -->
            <div class="tool-panel" style="margin-bottom: 24px">
                <h2 style="font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 16px">Dork Builder</h2>
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 16px">
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">site:</label>
                        <input
                            id="f-site"
                            type="text"
                            placeholder="example.com"
                            oninput="buildQuery()"
                            style="
                                width: 100%;
                                background: var(--surface-2);
                                border: 1px solid var(--border);
                                border-radius: 6px;
                                padding: 8px 12px;
                                font-size: 13px;
                                color: var(--text);
                                font-family: 'JetBrains Mono', monospace;
                                box-sizing: border-box;
                            "
                        />
                    </div>
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">filetype:</label>
                        <select id="f-filetype" onchange="buildQuery()" style="width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); cursor: pointer">
                            <option value="">- any -</option>
                            <option>pdf</option>
                            <option>doc</option>
                            <option>docx</option>
                            <option>xls</option>
                            <option>xlsx</option>
                            <option>txt</option>
                            <option>sql</option>
                            <option>log</option>
                            <option>env</option>
                            <option>php</option>
                            <option>asp</option>
                            <option>aspx</option>
                            <option>json</option>
                            <option>xml</option>
                            <option>config</option>
                            <option>bak</option>
                            <option>old</option>
                            <option>pem</option>
                            <option>key</option>
                            <option>sh</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">intitle:</label>
                        <input
                            id="f-intitle"
                            type="text"
                            placeholder="login panel"
                            oninput="buildQuery()"
                            style="width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: inherit; box-sizing: border-box"
                        />
                    </div>
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">inurl:</label>
                        <input
                            id="f-inurl"
                            type="text"
                            placeholder="/admin"
                            oninput="buildQuery()"
                            style="width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: inherit; box-sizing: border-box"
                        />
                    </div>
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">intext:</label>
                        <input
                            id="f-intext"
                            type="text"
                            placeholder="password"
                            oninput="buildQuery()"
                            style="width: 100%; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 13px; color: var(--text); font-family: inherit; box-sizing: border-box"
                        />
                    </div>
                    <div>
                        <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 4px">Custom operators</label>
                        <input
                            id="f-custom"
                            type="text"
                            placeholder='ext:bak -site:example.com "index of"'
                            oninput="buildQuery()"
                            style="
                                width: 100%;
                                background: var(--surface-2);
                                border: 1px solid var(--border);
                                border-radius: 6px;
                                padding: 8px 12px;
                                font-size: 13px;
                                color: var(--text);
                                font-family: 'JetBrains Mono', monospace;
                                box-sizing: border-box;
                            "
                        />
                    </div>
                </div>
                <div style="margin-bottom: 12px">
                    <label style="display: block; font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px">QUERY PREVIEW</label>
                    <div
                        id="query-preview"
                        style="background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--accent); min-height: 44px; word-break: break-all"
                    ></div>
                </div>
                <div style="display: flex; gap: 10px">
                    <button onclick="copyQuery()" style="background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer">Copy Query</button>
                    <button onclick="searchGoogle()" style="background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 10px 18px; font-size: 14px; cursor: pointer">Search on Google ↗</button>
                    <button onclick="clearBuilder()" style="background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 10px 14px; font-size: 14px; cursor: pointer">Clear</button>
                </div>
            </div>

            <!-- Library -->
            <div>
                <h2 style="font-size: 14px; font-weight: 700; color: var(--text); margin: 0 0 14px">Dork Library <span id="dork-count" style="font-weight: 400; color: var(--text-muted)"></span></h2>
                <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px">
                    <input
                        id="dork-search"
                        type="search"
                        placeholder="Search dorks…"
                        oninput="renderDorks()"
                        style="flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; color: var(--text); font-family: inherit"
                    />
                </div>
                <div id="cat-tabs" style="display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px"></div>
                <div id="dork-list"></div>
            </div>
        </div>

        <script src="../../js/app.js" defer></script>

        <script src="../../js/share.js" defer></script>
        <script src="../../js/smart-detect.js" defer></script>
        <script src="../../js/components.js" defer></script>
        <script src="../../js/shortcuts.js" defer></script>
        <script src="../../js/pwa.js" defer></script>
        <script src="script.js" defer></script>
        <script src="../../js/page-init.js" defer></script>
    </body>
